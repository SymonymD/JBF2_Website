// Array of day names
var dayNames = new
Array("Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday");

// Array of month names
var monthNames = new Array("January","February","March","April","May","June","July","August","September","October","November","December");

today = new Date()
lastmod = new Date(document.lastModified)
diffdays = Math.ceil( (today.getTime()-
lastmod.getTime())/(24*60*60*1000) )
var then = new Date(document.lastModified);
document.writeln("This page was updated on "+ dayNames[then.getDay()] + " " + then.getDate() + " " + monthNames[then.getMonth()] + " 19" + then.getYear() + ", just " + diffdays + " days ago.")
