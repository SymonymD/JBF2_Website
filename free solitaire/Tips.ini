[Tips]
Tip1=Each game window contains a context-sensitive menu accessible by clicking with the right mouse button. The menu provides items for starting a new game, undoing a move, setting preferences, and more.
Tip2=You can click in the initial game select panel at any time to close the current game and start a new game of the type selected.
Tip3=You can access the on-line help by pressing the "F1" key at any time.
Tip4=Free Solitaire is completely free, however, if you would like a version without ads, consider purchasing Solitaire Plus! Solitaire Plus provides more games and features minus the ads.
Tip5=The "Restart" menu item will restart the current game from the beginning. Select "New Game" to get a new deal of the cards.
Tip6=Free Solitaire provides a smart-dragging feature that automatically scans the game window for valid moves. Therefore, most moves can be achieved by simply nudging a card with the left mouse button. See the on-line help for more details.
Tip7=The "Other" panel of the "Preferences" dialog allows you to turn smart-dragging off if you do not care for the feature.
Tip8=You can double-click a card to move it to a foundation. You can also single click the card with the Ctrl or Shift key pressed to move it to a foundation.
Tip9=In FreeCell and SeaTowers, a middle mouse button (or wheel) click will move a card to a free cell.
Tip10=The "Preferences" dialog allows you to change the background color for the game windows.
Tip11=Common shortcuts are provided for many game functions. See the "Common shortcuts" page in the on-line help for more details.
Tip12=Free Solitaire will look best on high-color (or better) video and 1024x768 or larger displays.
Tip13=Goodsol Development distributes many shareware solitaire apps containing games unique to our products. Find more information at our web site at http://www.goodsol.com.
Tip14=Sea Towers is very similar to the popular FreeCell game, with the main differences being that cards are built down in the same suit in the tableau and only Kings can be moved to open tableau spaces.
Tip15=You can undo moves by clicking with the right mouse button in a game window and selecting "Undo".
Tip16=You can easily undo one or more moves by holding down the "Ctrl" key and the "Z" key at the same time.
Tip17=You can disable all sounds in the "Other" panel of the "Preferences" dialog.
Tip18=Free Solitaire records your game statistics, however, purchase of Solitaire Plus! is required in order to view the stats.
Tip19=The "Preferences" dialog allows you to change the card back to one of three built-in types. If you have high-color or better video, you can also use any BMP, JPEG, or PCX image as a card back as well.
Tip20=The "Autoplay" feature for games with foundations allows the game to automatically move available cards to the foundation. The autoplay in Free Solitaire is very aggressive (cards are moved as soon as available), but you can use the undo function to back up from one or more autoplays.
Tip21=You can enable/disable Autoplay at will by pressing Ctrl-A (the Ctrl key and the "A" key pressed simultaneously).
Tip22=Forty Thieves provides a "peek" panel to see the next card in the stock. Access it by clicking in the game window with the right mouse button and selecting "Peek".
Tip23=Goodsol Development provides technical support for Free Solitaire. E-mail us at freesol@goodsol.com. Please provide as much information as possible if you have a problem.
Tip24=In Spider, you can enable the "Same Suit Moves" option to increase the difficulty of the game.
Tip25=For games that have a "stock" pile, you can click the middle mouse button (or the wheel) to get the next card.^^^^If you do not have a middle button, you may press the space bar instead.
Tip26=The "Preferences" dialog provides two card size selections. The large cards allow all game windows to fit on a 1024x768 display. The small cards allow all games to fit on 800x600 displays.
Tip27=Klondike has options for one or three card draw in the right-click popup menu.
Tip28=In Montana, you can click an open space to fill it with the proper card.
Tip29=Free Solitaire was developed using Borland C++ Builder 4.